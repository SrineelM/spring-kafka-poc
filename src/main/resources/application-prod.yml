# =========================================================================
# PRODUCTION PROFILE (application-prod.yml) — THE CLOUD BATTLEFIELD
# =========================================================================
# This profile is specifically tuned for Google Cloud Platform (GKE) 
# deployments using managed Spanner, AlloyDB, and Confluent Cloud.
#
# TUTORIAL: Security & Dynamic Resolution
# In production, we NEVER hardcode secrets or connection strings. Instead, 
# we use ${VARIABLE_NAME} syntax to resolve values from:
# 1. Environment variables (set in GKE Deployment YAML)
# 2. GCP Secret Manager (integrated via Spring Cloud GCP)
# =========================================================================

spring:
  cloud:
    gcp:
      # -------------------------------------------------------------------
      # CLOUD SPANNER — Global Scale Persistence
      # -------------------------------------------------------------------
      # Spanner provides external consistency and high availability.
      # These properties are injected at runtime by the environment.
      spanner:
        project-id: ${GCP_PROJECT_ID}
        instance-id: ${SPANNER_INSTANCE_ID}
        database: ${SPANNER_DATABASE_ID}
      
      # -------------------------------------------------------------------
      # ALLOYDB — High-Performance PostgreSQL
      # -------------------------------------------------------------------
      # Used as an alternative or supplementary relational store.
      alloydb:
        project-id: ${GCP_PROJECT_ID}
        region: ${ALLOYDB_REGION}
        cluster: ${ALLOYDB_CLUSTER_ID}
        instance: ${ALLOYDB_INSTANCE_ID}
        database: ${ALLOYDB_DATABASE_ID}

  # -----------------------------------------------------------------------
  # PRODUCTION KAFKA — Confluent Cloud or Managed Kafka
  # -----------------------------------------------------------------------
  kafka:
    # Points to the production broker cluster (e.g. pkc-xyz.gcp.confluent.cloud:9092)
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS}
    properties:
      # Secure Schema Registry endpoint
      schema.registry.url: ${SCHEMA_REGISTRY_URL}

# -------------------------------------------------------------------------
# PRODUCTION ARCHITECTURE TUNING
# -------------------------------------------------------------------------
app:
  database:
    # Set to true to activate the real SpannerTransactionService via 
    # @ConditionalOnProperty. This switches the app from local H2 logic
    # to the high-scale Spanner adapter.
    spanner-enabled: true

# -------------------------------------------------------------------------
# PRODUCTION LOGGING — Optimized for Cloud Logging
# -------------------------------------------------------------------------
logging:
  level:
    # Keeps logs concise to save on ingestion/storage costs while still 
    # capturing all critical business events.
    com.example.springkafkapoc: INFO
